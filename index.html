<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartungsmodus | GE System</title>
    <style>
        body {
            background-color: #000000;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Scanline-Effekt (Alte Monitore) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 2;
        }

        .logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.6));
        }

        .status-box {
            border: 2px solid #ff0000;
            padding: 20px 40px;
            background: rgba(255, 0, 0, 0.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            display: inline-block;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 2px 2px #000, 0 0 15px #ff0000;
        }

        p.sub-text {
            font-size: 1.1rem;
            margin-top: 10px;
            color: #ff3333;
        }

        .loader-bar {
            width: 300px;
            height: 3px;
            background: #200;
            margin: 30px auto;
            position: relative;
            overflow: hidden;
        }

        .loader-fill {
            position: absolute;
            width: 50%;
            height: 100%;
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
            animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .footer-info {
            font-size: 0.75rem;
            color: #500;
            margin-top: 40px;
            letter-spacing: 1px;
        }

        /* Pulsierendes Warnlicht im Hintergrund */
        .ambient-light {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(150, 0, 0, 0.1) 0%, rgba(0,0,0,0) 70%);
            animation: pulse 4s infinite alternate;
            z-index: 1;
        }

        @keyframes pulse {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>
    
    <div class="container">
        <!-- Deine logo.png muss im selben Ordner liegen -->
        <img src="logo.png" alt="Logo" class="logo">
        
        <div class="status-box">
            <h1>SYSTEM-WARTUNG</h1>
            <p class="sub-text">DIENST AKTUELL NICHT VERFÜGBAR</p>
        </div>
        
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
        
        <div class="footer-info">
            ZUGRIFF VERWEIGERT // PROTOKOLL: GE-MAINTENANCE-01 // STANDORT: BOCHUM
        </div>
    </div>

</body>
</html>
