<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System-Update | GE</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00f2ff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* Pulsierender Kreis im Hintergrund */
        .loader {
            width: 250px;
            height: 250px;
            border: 2px solid rgba(0, 242, 255, 0.1);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.2; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.8; }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
        }

        p {
            font-size: 1rem;
            color: #888;
        }

        .status-bar {
            width: 300px;
            height: 4px;
            background: #222;
            margin: 30px auto;
            position: relative;
            overflow: hidden;
        }

        .status-progress {
            width: 40%;
            height: 100%;
            background: #00f2ff;
            box-shadow: 0 0 15px #00f2ff;
            animation: loading 3s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    
    <div class="container">
        <h1 class="glitch">System Offline</h1>
        <p>Wartungsarbeiten im Gange</p>
        
        <div class="status-bar">
            <div class="status-progress"></div>
        </div>
        
        <p style="font-size: 0.7rem; color: #444;">GE-Unit: 04-2024 // Access: Restricted</p>
    </div>

</body>
</html>
