<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junior Rescue - Pro Learning</title>
    <style>
        :root { 
            --fire: #e74c3c; --navy: #0a192f; --blue: #3498db; 
            --bg: #f4f7f6; --gold: #f1c40f; --white: #ffffff; --green: #2ecc71; 
        }
        
        /* GRUNDLAYOUT */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            color: var(--navy); 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
        }

        /* CONTAINER: Passt sich der Bildschirmbreite an */
        .container { 
            width: 95%; 
            max-width: 1200px; /* Am PC schön breit */
            margin: 20px auto;
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        /* KARTEN-DESIGN */
        .card { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border-bottom: 6px solid var(--navy); 
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hidden { display: none; }
        img.logo { max-width: 200px; height: auto; display: block; margin: 0 auto 20px; }

        /* RASTER FÜR PC (2 SPALTEN) */
        .grid-menu { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-top: 20px;
        }

        /* FORMULAR ELEMENTE */
        input, textarea, select { 
            width: 100%; padding: 16px; margin: 10px 0; 
            border: 2px solid #eee; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; 
        }
        
        button { 
            width: 100%; padding: 18px; border: none; border-radius: 12px; 
            font-weight: bold; cursor: pointer; font-size: 16px; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            margin-top: 10px; 
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.95); }
        
        .btn-red { background: var(--fire); color: white; }
        .btn-navy { background: var(--navy); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-outline { background: none; border: 2px solid #ddd; color: #777; }

        /* QUIZ SYSTEM */
        .quiz-opt { 
            background: #f8f9fa; border: 2px solid #eee; padding: 20px; 
            border-radius: 15px; margin-bottom: 15px; cursor: pointer; 
            font-weight: 500; font-size: 18px; transition: 0.3s; 
        }
        .quiz-opt.correct { background: var(--green) !important; border-color: #27ae60 !important; color: white; }
        .quiz-opt.wrong { background: var(--fire) !important; border-color: #c0392b !important; color: white; }

        /* LISTEN & ITEMS */
        .topic-item { 
            padding: 20px; border: 1px solid #eee; border-radius: 15px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; cursor: pointer; background: white; transition: 0.2s;
        }
        .topic-item:hover { border-color: var(--blue); background: #fafafa; }

        /* HANDY-ANPASSUNG (Mobile) */
        @media (max-width: 768px) {
            .grid-menu { grid-template-columns: 1fr; } /* Nur eine Spalte auf dem Handy */
            .container { width: 92%; margin: 10px auto; }
            .card { padding: 20px; }
            h2 { font-size: 22px; }
            button { padding: 15px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="scr-start" class="card" style="max-width: 500px; margin: 40px auto;">
        <img src="logo.png" alt="Logo" class="logo">
        <h2 style="text-align:center">Junior Rescue Login</h2>
        <input type="text" id="l-name" placeholder="Name oder E-Mail">
        <input type="password" id="l-pw" placeholder="Passwort / Code">
        <button class="btn-navy" onclick="doLogin()">Anmelden</button>
        <button class="btn-outline" onclick="show('scr-join')">Neu registrieren</button>
        <button class="btn-outline" onclick="show('scr-org')" style="border:none; font-size:12px; margin-top:30px;">Organisation anmelden</button>
    </div>

    <div id="scr-dash" class="card hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h2 id="dash-txt" style="margin:0">Bereit?</h2>
            <button class="btn-outline" onclick="location.reload()" style="width:auto; padding: 10px 20px;">Abmelden</button>
        </div>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        
        <div class="grid-menu">
            <button class="btn-navy" onclick="doLoad('info')" style="height:150px; font-size: 24px;">📚<br>WISSEN</button>
            <button class="btn-red" onclick="doLoad('quiz')" style="height:150px; font-size: 24px;">❓<br>QUIZ</button>
        </div>

        <div id="adm-box" class="hidden" style="margin-top: 30px; padding-top: 20px; border-top: 2px dashed #eee;">
            <h3 style="margin-top:0">Ausbilder Bereich</h3>
            <button class="btn-green" onclick="show('scr-add')" style="max-width: 300px;">➕ Neuen Inhalt erstellen</button>
        </div>
    </div>

    <div id="scr-list" class="card hidden">
        <h2 id="list-title">Themen</h2>
        <div id="out" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;"></div>
        <button class="btn-navy" onclick="show('scr-dash')" style="margin-top:30px; max-width: 200px;">Zurück</button>
    </div>

    <div id="scr-quiz-play" class="card hidden" style="max-width: 800px; margin: 0 auto;">
        <h3 id="q-title" style="font-size: 24px; margin-bottom: 25px;">Frage</h3>
        <div id="q-options"></div>
        <button id="q-next" class="btn-navy hidden" onclick="show('scr-list')">Zurück zur Liste</button>
    </div>

    <div id="scr-detail" class="card hidden" style="max-width: 800px; margin: 0 auto;">
        <h2 id="det-title" style="color: var(--fire)"></h2>
        <div style="background: #f9f9f9; padding: 25px; border-radius: 15px; border-left: 5px solid var(--fire);">
            <p id="det-body" style="white-space: pre-wrap; line-height:1.8; font-size: 18px; margin:0;"></p>
        </div>
        <button class="btn-navy" onclick="show('scr-list')" style="margin-top: 30px; max-width: 200px;">Zurück zur Liste</button>
    </div>

    <div id="scr-add" class="card hidden" style="max-width: 700px; margin: 0 auto;">
        <h3>Inhalt für deine Truppe erstellen</h3>
        <select id="a-type" onchange="toggleAddFields()">
            <option value="info">📚 Wissen (Lernkarte)</option>
            <option value="quiz">❓ Quiz (Frage)</option>
        </select>
        <input type="text" id="a-title" placeholder="Titel der Karte oder Quizfrage">
        
        <div id="info-fields">
            <textarea id="a-body" placeholder="Hier den Text reinschreiben, den die Jugendlichen lernen sollen..." rows="8"></textarea>
        </div>

        <div id="quiz-fields" class="hidden" style="background: #f0f4f8; padding: 20px; border-radius: 15px;">
            <p style="font-weight: bold; margin-top:0;">Antworten eingeben und die richtige markieren:</p>
            <div style="display:grid; gap:10px">
                <div style="display:flex; align-items:center; gap:15px; background:white; padding:10px; border-radius:10px;">
                    <input type="radio" name="correctIdx" value="0" checked style="width:25px; margin:0">
                    <input type="text" id="ans0" placeholder="Antwort 1 (Richtig?)" style="margin:0">
                </div>
                <div style="display:flex; align-items:center; gap:15px; background:white; padding:10px; border-radius:10px;">
                    <input type="radio" name="correctIdx" value="1" style="width:25px; margin:0">
                    <input type="text" id="ans1" placeholder="Antwort 2" style="margin:0">
                </div>
                <div style="display:flex; align-items:center; gap:15px; background:white; padding:10px; border-radius:10px;">
                    <input type="radio" name="correctIdx" value="2" style="width:25px; margin:0">
                    <input type="text" id="ans2" placeholder="Antwort 3" style="margin:0">
                </div>
            </div>
        </div>

        <button class="btn-red" onclick="doSave()" style="margin-top:20px">💾 Jetzt Speichern</button>
        <button class="btn-outline" onclick="show('scr-dash')">Abbrechen</button>
    </div>

    <div id="scr-org" class="card hidden" style="max-width: 500px; margin: 0 auto;">
        <h3>Organisation anmelden</h3>
        <input type="text" id="o-name" placeholder="Name der Feuerwehr / Jugendgruppe">
        <input type="email" id="o-mail" placeholder="Deine Admin E-Mail">
        <button class="btn-navy" onclick="doCreateOrg()">Code für Truppe generieren</button>
        <div id="o-code-box" class="hidden" style="background:#fff3cd; padding:20px; border-radius:15px; margin-top:15px; text-align:center; border: 2px dashed orange;">
            Dein Gruppen-Passwort & Code:<br>
            <strong id="o-code" style="font-size: 24px; letter-spacing: 2px;"></strong>
        </div>
        <button class="btn-outline" onclick="show('scr-start')" style="margin-top:20px">Zurück</button>
    </div>

    <div id="scr-join" class="card hidden" style="max-width: 500px; margin: 0 auto;">
        <h3>Neues Mitglied registrieren</h3>
        <input type="text" id="j-code" placeholder="Einladungscode deiner Wehr">
        <input type="text" id="u-name" placeholder="Dein Vorname">
        <input type="password" id="u-pw" placeholder="Passwort ausdenken">
        <button class="btn-navy" onclick="doFinishUser()">Konto erstellen</button>
        <button class="btn-outline" onclick="show('scr-start')">Abbrechen</button>
    </div>
</div>

<script type="module">
    // Firebase Code bleibt gleich wie in der Version davor, 
    // er steuert die Logik hinter den schönen neuen Karten.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDW4mzVZB4QgjQzp9gR5GHPtxQ-Shmg5Lc",
        authDomain: "junior-rescue-fire-leraning.firebaseapp.com",
        projectId: "junior-rescue-fire-leraning",
        storageBucket: "junior-rescue-fire-leraning.firebasestorage.app",
        messagingSenderId: "464798794214",
        appId: "1:464798794214:web:e7e1d4969afa52494ad627"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const SUPER_ADMIN = "lucadiscord2411@gmail.com";

    let curOrg = "";
    let isAdmin = false;

    window.show = (id) => {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        window.scrollTo(0,0);
    };

    window.toggleAddFields = () => {
        const type = document.getElementById('a-type').value;
        document.getElementById('info-fields').classList.toggle('hidden', type !== 'info');
        document.getElementById('quiz-fields').classList.toggle('hidden', type !== 'quiz');
    };

    window.doLogin = async () => {
        const name = document.getElementById('l-name').value.trim();
        const pw = document.getElementById('l-pw').value.trim();
        
        const qOrg = query(collection(db, "orgs"), where("mail", "==", name), where("code", "==", pw));
        const sOrg = await getDocs(qOrg);

        if(!sOrg.empty) {
            curOrg = sOrg.docs[0].id;
            isAdmin = (name.toLowerCase() === SUPER_ADMIN.toLowerCase());
            document.getElementById('dash-txt').innerText = "Ausbilder: " + sOrg.docs[0].data().name;
            if(isAdmin) document.getElementById('adm-box').classList.remove('hidden');
            show('scr-dash');
        } else {
            const qU = query(collection(db, "users"), where("name", "==", name), where("pw", "==", pw));
            const sU = await getDocs(qU);
            if(!sU.empty) {
                curOrg = sU.docs[0].data().orgId;
                document.getElementById('dash-txt').innerText = "Hallo " + name;
                show('scr-dash');
            } else alert("Login falsch!");
        }
    };

    window.doSave = async () => {
        const type = document.getElementById('a-type').value;
        const title = document.getElementById('a-title').value;
        let target = curOrg;
        if(isAdmin && confirm("GLOBAL veröffentlichen?")) target = "GLOBAL";

        let data = { orgId: target, type, title, createdAt: serverTimestamp() };

        if(type === 'info') {
            data.body = document.getElementById('a-body').value;
        } else {
            const answers = [
                document.getElementById('ans0').value,
                document.getElementById('ans1').value,
                document.getElementById('ans2').value
            ];
            const correctIdx = document.querySelector('input[name="correctIdx"]:checked').value;
            data.answers = answers;
            data.correctIdx = parseInt(correctIdx);
        }

        await addDoc(collection(db, "contents"), data);
        alert("Erfolgreich gespeichert!");
        show('scr-dash');
    };

    window.doLoad = async (t) => {
        const q = query(collection(db, "contents"), where("orgId", "in", [curOrg, "GLOBAL"]), where("type", "==", t));
        const s = await getDocs(q);
        let h = "";
        s.forEach(docSnap => {
            const d = docSnap.data();
            const isGlobal = d.orgId === 'GLOBAL';
            h += `
            <div class="topic-item" onclick="${t === 'info' ? `openInfo('${d.title}', '${d.body.replace(/\n/g, "\\n")}')` : `openQuiz('${docSnap.id}')`}">
                <div>
                    <span class="badge ${isGlobal ? 'global-badge' : 'local-badge'}">${isGlobal ? '⭐ GLOBAL' : 'EIGENE WEHR'}</span><br>
                    <strong>${d.title}</strong>
                </div>
                <div style="display:flex; align-items:center; gap:10px">
                    ${isAdmin ? `<button onclick="event.stopPropagation(); doDelete('${docSnap.id}')" style="width:40px; height:40px; padding:0; background:#fff; color:red; border:1px solid red;">🗑️</button>` : ''}
                    <span style="font-size: 20px;">➔</span>
                </div>
            </div>`;
        });
        document.getElementById('out').innerHTML = h || "<p style='grid-column: 1/-1; text-align:center;'>Noch keine Inhalte vorhanden.</p>";
        document.getElementById('list-title').innerText = t === 'info' ? "Themen Übersicht" : "Quiz Herausforderungen";
        show('scr-list');
    };

    window.openInfo = (title, body) => {
        document.getElementById('det-title').innerText = title;
        document.getElementById('det-body').innerText = body;
        show('scr-detail');
    };

    window.openQuiz = async (id) => {
        const s = await getDocs(query(collection(db, "contents"))); 
        const d = s.docs.find(x => x.id === id).data();
        
        document.getElementById('q-title').innerText = d.title;
        let h = "";
        d.answers.forEach((ans, i) => {
            h += `<div class="quiz-opt" onclick="checkAnswer(this, ${i}, ${d.correctIdx})">${ans}</div>`;
        });
        document.getElementById('q-options').innerHTML = h;
        document.getElementById('q-next').classList.add('hidden');
        show('scr-quiz-play');
    };

    window.checkAnswer = (el, clicked, correct) => {
        const opts = document.querySelectorAll('.quiz-opt');
        opts.forEach(o => o.style.pointerEvents = "none");
        if(clicked === correct) el.classList.add('correct');
        else {
            el.classList.add('wrong');
            opts[correct].classList.add('correct');
        }
        document.getElementById('q-next').classList.remove('hidden');
    };

    window.doDelete = async (id) => {
        if(confirm("Möchtest du diesen Inhalt wirklich löschen?")) {
            await deleteDoc(doc(db, "contents", id));
            show('scr-dash');
        }
    };

    window.doCreateOrg = async () => {
        const name = document.getElementById('o-name').value;
        if(!name) return alert("Name der Wehr fehlt!");
        const code = "JR-" + Math.random().toString(36).substring(2, 7).toUpperCase();
        await addDoc(collection(db, "orgs"), { name, mail: document.getElementById('o-mail').value, code });
        document.getElementById('o-code').innerText = code;
        document.getElementById('o-code-box').classList.remove('hidden');
    };

    window.doFinishUser = async () => {
        const code = document.getElementById('j-code').value.toUpperCase().trim();
        const q = query(collection(db, "orgs"), where("code", "==", code));
        const s = await getDocs(q);
        if(!s.empty) {
            await addDoc(collection(db, "users"), { 
                name: document.getElementById('u-name').value, 
                pw: document.getElementById('u-pw').value, 
                orgId: s.docs[0].id 
            });
            alert("Willkommen im Team! Du kannst dich jetzt einloggen."); 
            show('scr-start');
        } else alert("Der Einladungscode deiner Wehr ist falsch.");
    };
</script>
</body>
</html>
