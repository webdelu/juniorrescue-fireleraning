<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wartungsmodus | System Red</title>
    <style>
        body {
            background-color: #000000; /* Tiefschwarz */
            color: #ff0000; /* Signalrot */
            font-family: 'Courier New', Courier, monospace; /* Technischer Look */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            z-index: 2;
        }

        /* Das Logo */
        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.5));
            animation: flicker 4s infinite;
        }

        /* Pulsierender Hintergrund-Effekt */
        .pulse-bg {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.3); opacity: 1; }
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.4; }
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            letter-spacing: 5px;
            text-shadow: 0 0 15px #ff0000;
        }

        .status-box {
            border: 1px solid #ff0000;
            padding: 15px;
            display: inline-block;
            background: rgba(255, 0, 0, 0.05);
            box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.2);
        }

        .loader-bar {
            width: 250px;
            height: 2px;
            background: #300;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }

        .loader-fill {
            position: absolute;
            width: 60%;
            height: 100%;
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            animation: scan 2.5s infinite linear;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .warning-text {
            font-size: 0.8rem;
            color: #600;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="pulse-bg"></div>
    
    <div class="container">
        <!-- Logo Platzhalter -->
        <img src="logo.png" alt="GE Logo" class="logo">
        
        <div class="status-box">
            <h1>System Alert</h1>
            <p>Maintenance in Progress</p>
        </div>
        
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
        
        <p class="warning-text">Authorized Personnel Only // Protocol 0-GE</p>
    </div>

</body>
</html>
